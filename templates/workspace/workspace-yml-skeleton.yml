# workspace.yml — single source of truth for this workspace.
# See README.md "## Schema" section for the full schema reference.

workspace:
  name: PLACEHOLDER_WS_NAME
  xcworkspace: true
  code_workspace: true
  tasks:
    enabled: true
    mode: sibling          # sibling | path | symlink
    path: ./Tasks          # used by sibling / path modes
    symlink_target: null   # required by symlink mode (e.g. ../../Tasks)
  docs:
    enabled: true
    mode: sibling          # sibling | path | symlink
    path: ./Docs           # used by sibling / path modes
    symlink_target: null   # required by symlink mode (e.g. ../../Docs)

remotes:
  - origin

defaults:
  default_branch: main
  push_remotes: all
  release_strategy: patch

bootstrap:
  use_gh: false
  push_after_init: false
  generate_local_skills: false
  commit_after_init: true
  initial_commit_message: Initial commit
  git_author: null

packages: []
